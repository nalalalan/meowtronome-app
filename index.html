<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>meowtronome / aolabs.io</title>
  <meta name="description" content="A quiet browser metronome using a real cat meow recording.">
  <link rel="canonical" href="https://meowtronome.aolabs.io/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="AO Labs">
  <meta property="og:title" content="meowtronome">
  <meta property="og:description" content="A quiet browser metronome using a real cat meow recording.">
  <meta property="og:url" content="https://meowtronome.aolabs.io/">
  <meta property="og:image" content="https://meowtronome.aolabs.io/icon.svg">
  <meta name="twitter:card" content="summary">
  <meta name="application-name" content="meowtronome">
  <meta name="theme-color" content="#f5eee4">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="preload" href="./assets/cat-dance-fluid.mp4" as="video" type="video/mp4">
  <link rel="preload" href="./assets/meow-silas.mp3" as="fetch" type="audio/mpeg" crossorigin>
  <link rel="stylesheet" href="https://aolabs.io/suite-header.css?v=20260516-suite-bloom">
  <link rel="stylesheet" href="./styles.css?v=20260520-fluid-cat">
</head>
<body>
  <header class="suite-topbar">
    <div class="suite-brand-cluster">
      <a class="suite-ao-home" href="https://aolabs.io/" aria-label="aolabs.io">
        <img src="https://aolabs.io/marks/ao-ink.svg?v=20260516-suite-bloom" alt="">
      </a>
      <a class="suite-app-brand" href="./" aria-label="meowtronome home">
        <img class="suite-app-mark" src="./icon.svg" alt="">
        <span class="suite-app-name">meowtronome</span>
      </a>
    </div>
  </header>

  <main class="shell">
    <section class="zen-card" aria-label="meowtronome controls">
      <div class="cat-scene" id="catScene" aria-hidden="true">
        <div class="pulse-ring" id="beatPulse"></div>
        <video class="cat-dancer" id="catDancer" poster="./assets/cat-dance-poster.png" muted playsinline loop preload="auto">
          <source src="./assets/cat-dance-fluid.webm" type="video/webm">
          <source src="./assets/cat-dance-fluid.mp4" type="video/mp4">
        </video>
      </div>

      <div class="tempo-readout">
        <h1>meowtronome</h1>
        <p>Silas meow</p>
        <div class="tempo-number">
          <strong id="bpmValue">96</strong>
          <span>bpm</span>
        </div>
      </div>

      <label class="slider-row" for="bpmRange">
        <span>tempo</span>
        <input id="bpmRange" type="range" min="40" max="220" value="96">
      </label>

      <div class="fine-row" aria-label="tempo controls">
        <input id="bpmInput" type="number" min="40" max="220" value="96" aria-label="beats per minute">
      </div>

      <fieldset class="segmented">
        <legend>beats</legend>
        <label><input type="radio" name="beats" value="2"><span>2</span></label>
        <label><input type="radio" name="beats" value="3"><span>3</span></label>
        <label><input type="radio" name="beats" value="4" checked><span>4</span></label>
      </fieldset>

      <div class="beat-dots" id="beatDots" aria-label="beat position"></div>

      <div class="actions">
        <button type="button" class="primary" id="toggleButton" aria-pressed="false">start</button>
        <button type="button" id="tapButton">tap</button>
      </div>

      <p class="state" id="statusText">real cat sound ready</p>
      <p class="credit">
        <a href="https://commons.wikimedia.org/wiki/File:Meow.ogg">Meow.ogg</a>
        by Dan Crosby / Dcrosby, CC BY-SA 3.0
      </p>
    </section>
  </main>

  <script src="./app.js?v=20260520-fluid-cat"></script>
</body>
</html>
