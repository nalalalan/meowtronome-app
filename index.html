<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>meowtronome / aolabs.io</title>
  <meta name="description" content="A quiet browser metronome using a voice beat sound.">
  <link rel="canonical" href="https://meowtronome.aolabs.io/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="AO Labs">
  <meta property="og:title" content="meowtronome">
  <meta property="og:description" content="A quiet browser metronome using a voice beat sound.">
  <meta property="og:url" content="https://meowtronome.aolabs.io/">
  <meta property="og:image" content="https://meowtronome.aolabs.io/icon.svg">
  <meta name="twitter:card" content="summary">
  <meta name="application-name" content="meowtronome">
  <meta name="theme-color" content="#f3f6f1">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="preload" href="./assets/hi.m4a?v=20260522-hi-voice" as="fetch" type="audio/mp4" crossorigin>
  <link rel="preload" href="./assets/cat-dance-cutout.webp" as="image">
  <link rel="stylesheet" href="https://aolabs.io/suite-header.css?v=20260516-suite-bloom">
  <link rel="stylesheet" href="./styles.css?v=20260521-yap-borderless">
</head>
<body>
  <header class="suite-topbar">
    <div class="suite-brand-cluster">
      <a class="suite-ao-home" href="https://aolabs.io/" aria-label="aolabs.io">
        <img src="https://aolabs.io/marks/ao-ink.svg?v=20260516-suite-bloom" alt="">
      </a>
      <a class="suite-app-brand" href="./" aria-label="meowtronome home">
        <img class="suite-app-mark" src="./icon.svg" alt="">
        <span class="suite-app-name">meowtronome</span>
      </a>
    </div>
  </header>

  <main class="shell">
    <section class="zen-card" aria-label="meowtronome controls">
      <div class="cat-scene" id="catScene" aria-hidden="true">
        <div class="pulse-ring" id="beatPulse"></div>
        <div class="cat-dancer motion-1" id="catDancer" data-pose="1">
          <div class="cat-shadow"></div>
          <div class="photo-cat">
            <span class="cat-frame previous pose-1" id="catFramePrevious"></span>
            <span class="cat-frame current pose-1" id="catFrameCurrent"></span>
          </div>
        </div>
      </div>

      <div class="tempo-readout">
        <h1>meowtronome</h1>
        <div class="tempo-number">
          <strong id="bpmValue">96</strong>
        </div>
      </div>

      <label class="slider-row" for="bpmRange">
        <span>tempo</span>
        <input id="bpmRange" type="range" min="40" max="220" step="1" value="96">
      </label>

      <fieldset class="segmented">
        <legend>beats</legend>
        <label><input type="radio" name="beats" value="2"><span>2/4</span></label>
        <label><input type="radio" name="beats" value="3"><span>3/4</span></label>
        <label><input type="radio" name="beats" value="4" checked><span>4/4</span></label>
      </fieldset>

      <div class="beat-dots" id="beatDots" aria-label="beat position"></div>

      <div class="actions">
        <button type="button" class="primary" id="toggleButton" aria-pressed="false">start</button>
        <button type="button" id="tapButton">tap</button>
      </div>

      <p class="state" id="statusText">sound ready</p>
    </section>
  </main>

  <script src="./app.js?v=20260522-hi-voice"></script>
</body>
</html>
